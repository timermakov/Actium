services:
  db:
    image: postgres:16
    container_name: actium_db
    restart: always
    env_file: .env.local
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net

  user-account-backend:
    build:
      context: ./user-account
    image: tsermakov/actium-user-account-backend:latest
    container_name: actium_user_account_backend
    restart: on-failure
    env_file: .env.local
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net

  ai-backend:
    build:
      context: ./templater/apps/api
    image: tsermakov/actium-ai-backend:latest
    container_name: actium_ai_backend
    env_file: .env.local
    networks:
      - backend_net
      - frontend_net

  templater-frontend:
    build:
      context: ./templater/apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: tsermakov/actium-templater-frontend:latest
    container_name: actium_templater_frontend
    env_file: .env.local
    ports:
      - "${WEB_PORT}:80"
    networks:
      - frontend_net
    depends_on:
      ai-backend:
        condition: service_started
      user-account-backend:
        condition: service_started

volumes:
  db_data:

networks:
  # front
  frontend_net:
    driver: bridge
    name: docflow_frontend_tier

  # back + BD
  backend_net:
    driver: bridge
    name: docflow_backend_tier
    internal: true