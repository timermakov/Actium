services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: platform_api
    env_file:
      - ../.env.local
    environment:
      API_PORT: ${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port ${API_PORT} --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: platform_web
    env_file:
      - ../.env.local
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api