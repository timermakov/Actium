services:
  ai-backend:
    build:
      context: apps/api
      dockerfile: Dockerfile
    image: tsermakov/actium-ai-backend:latest
    container_name: actium_ai_backend
    env_file:
      - ../.env.local
    environment:
      API_PORT: ${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT}/docs', timeout=2)\""]
      interval: 15s
      timeout: 5s
      retries: 5

  templater-frontend:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: tsermakov/actium-templater-frontend:latest
    container_name: actium_templater_frontend
    env_file:
      - ../.env.local
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      ai-backend:
        condition: service_started